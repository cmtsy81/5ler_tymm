<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğru mu? Yanlış mı?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Konfeti efekti için kütüphane -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1b4b; /* Ekranın geri kalanı için koyu arka plan */
            overflow: hidden; /* Kaydırma çubuklarını gizle */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 1920x1080 Sabit Oyun Alanı */
        #game-container {
            width: 1920px;
            height: 1080px;
            position: absolute;
            transform-origin: center center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .pop-animation {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .popup-anim {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Seçili buton efekti için */
        .btn-selected {
            ring: 8px solid;
            transform: scale(1.05);
            opacity: 1 !important;
        }
        
        .btn-unselected {
            opacity: 0.4;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="game-container" class="bg-gradient-to-br from-indigo-300 via-purple-300 to-pink-300 flex flex-col items-center justify-center p-10">

        <div class="text-center mb-10 pop-animation" style="animation-delay: 0.1s;">
            <h1 class="text-7xl font-black text-white drop-shadow-xl mb-6">
                🤔 Doğru mu? Yanlış mı?
            </h1>
            <p class="text-3xl font-bold text-purple-900 bg-white/60 inline-block px-10 py-4 rounded-full shadow-md">
                Tüm cümleleri dikkatlice oku ve kararını ver! 🚀
            </p>
        </div>

        <div id="quiz-container" class="w-full max-w-6xl space-y-8">
            </div>

        <div id="popup-overlay" class="absolute inset-0 bg-black/70 hidden flex items-center justify-center z-50 rounded-3xl backdrop-blur-sm">
            <div id="popup-content" class="bg-white rounded-[3rem] p-20 text-center shadow-2xl max-w-4xl w-full border-8 border-white">
                <div id="popup-icon" class="text-9xl mb-8"></div>
                <h2 id="popup-title" class="text-7xl font-black mb-6"></h2>
                <p id="popup-message" class="text-4xl font-bold text-gray-600 mb-12 leading-relaxed"></p>
                <button id="popup-btn" onclick="closePopup()" class="text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_rgba(0,0,0,0.2)] hover:translate-y-[4px] hover:shadow-[0_4px_0_rgba(0,0,0,0.2)] transition-all">
                </button>
            </div>
        </div>

    </div>

    <script>
        // =====================================================================
        // 🛠️ ŞABLON ALANI (SORULARI BURADAN DEĞİŞTİREBİLİRSİNİZ)
        // =====================================================================
        const quizData = [
            {
                id: 1,
                text: "Teknoloji sayesinde internette bilgiye saniyeler içinde ulaşabilir ve ödevlerimiz için araştırma yapabiliriz.",
                isCorrect: true 
            },
            {
                id: 2,
                text: "Teknolojiyi kontrollü ve bilinçli kullanma durumuna dijital bağımlılık denir.",
                isCorrect: false 
            }
        ];
        // =====================================================================
        // ŞABLON ALANI SONU
        // =====================================================================

        let userAnswers = {}; // Öğrencinin cevaplarını tutacağımız obje

        // --- SES EFEKTLERİ İÇİN WEB AUDIO API ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            
            const now = audioCtx.currentTime;

            if (type === 'click') {
                // Yumuşak, ksilofon benzeri dokunma sesi
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine'; // En yumuşak ses dalgası
                osc.frequency.setValueAtTime(450, now);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                
                osc.start(now);
                osc.stop(now + 0.15);

            } else if (type === 'correct') {
                // Yumuşak zil sesi
                const notes = [523.25, 659.25, 783.99];
                notes.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(freq, now);

                    const startTime = now + (index * 0.08);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.15, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);

                    osc.start(startTime);
                    osc.stop(startTime + 0.6);
                });

            } else if (type === 'wrong') {
                // Yumuşak, yavaşça düşen uyarı tonu
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(329.63, now);
                osc.frequency.exponentialRampToValueAtTime(261.63, now + 0.4);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                
                osc.start(now);
                osc.stop(now + 0.6);

            } else if (type === 'finish') {
                // Bitiş Melodisi (Fanfar)
                const notes = [523.25, 659.25, 783.99, 1046.50]; // Do, Mi, Sol, İnce Do
                notes.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    
                    const startTime = now + (index * 0.15);
                    osc.frequency.setValueAtTime(freq, startTime);
                    
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.15, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.4);
                    
                    osc.start(startTime);
                    osc.stop(startTime + 0.5);
                });
            }
        }
        // ----------------------------------------

        // Ekranı 1920x1080 oranında ölçeklendirme fonksiyonu
        function resizeGame() {
            const container = document.getElementById('game-container');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            container.style.transform = `scale(${scale})`;
        }

        // Pencere boyutu değiştiğinde ölçeklemeyi güncelle
        window.addEventListener('resize', resizeGame);

        const quizContainer = document.getElementById('quiz-container');

        // Uygulamayı Başlat
        function initApp() {
            resizeGame(); // İlk yüklemede ölçeklendir
            quizContainer.innerHTML = ''; // İçeriği temizle
            userAnswers = {}; // Cevapları sıfırla

            quizData.forEach((question, index) => {
                const card = createQuestionCard(question, index);
                quizContainer.appendChild(card);
            });
        }

        // Soru Kartı Oluşturan Fonksiyon
        function createQuestionCard(question, index) {
            const card = document.createElement('div');
            const delay = 0.2 + (index * 0.15);
            card.className = `bg-white rounded-[2.5rem] p-10 shadow-2xl border-8 border-white/50 pop-animation relative overflow-hidden`;
            card.style.animationDelay = `${delay}s`;
            card.style.opacity = '0';

            card.innerHTML = `
                <div class="flex flex-col items-center mb-8">
                    <h2 class="text-4xl font-bold text-gray-700 leading-snug text-center">
                        ${question.text}
                    </h2>
                </div>
                
                <div class="flex gap-8" id="buttons-${question.id}">
                    <button id="btn-true-${question.id}" onclick="selectAnswer(${question.id}, true)" class="flex-1 bg-green-400 text-white font-bold text-4xl py-8 px-8 rounded-3xl shadow-[0_8px_0_#16a34a] transition-all flex items-center justify-center gap-4">
                        <span class="text-5xl">👍</span> DOĞRU
                    </button>
                    <button id="btn-false-${question.id}" onclick="selectAnswer(${question.id}, false)" class="flex-1 bg-red-400 text-white font-bold text-4xl py-8 px-8 rounded-3xl shadow-[0_8px_0_#dc2626] transition-all flex items-center justify-center gap-4">
                        <span class="text-5xl">👎</span> YANLIŞ
                    </button>
                </div>
            `;

            return card;
        }

        // Öğrenci Bir Cevap Seçtiğinde Çalışan Fonksiyon
        function selectAnswer(questionId, choice) {
            playSound('click'); // Butona tıklandığında ses çal
            
            userAnswers[questionId] = choice;

            const btnTrue = document.getElementById(`btn-true-${questionId}`);
            const btnFalse = document.getElementById(`btn-false-${questionId}`);

            // Tüm butonların efektini sıfırla ve hafifçe soluklaştır
            btnTrue.className = "flex-1 bg-green-400 text-white font-bold text-4xl py-8 px-8 rounded-3xl shadow-[0_8px_0_#16a34a] transition-all flex items-center justify-center gap-4 btn-unselected";
            btnFalse.className = "flex-1 bg-red-400 text-white font-bold text-4xl py-8 px-8 rounded-3xl shadow-[0_8px_0_#dc2626] transition-all flex items-center justify-center gap-4 btn-unselected";

            // Seçilen butonu vurgula
            if (choice === true) {
                btnTrue.classList.remove('btn-unselected');
                btnTrue.classList.add('ring-8', 'ring-green-500', 'scale-105', 'opacity-100');
            } else {
                btnFalse.classList.remove('btn-unselected');
                btnFalse.classList.add('ring-8', 'ring-red-500', 'scale-105', 'opacity-100');
            }

            // Eğer tüm sorular cevaplandıysa değerlendirmeyi çalıştır
            if (Object.keys(userAnswers).length === quizData.length) {
                // Son animasyonun bitmesi için kısa bir gecikme ekliyoruz
                setTimeout(evaluateAnswers, 600);
            }
        }

        // Tüm Cevapları Kontrol Eden Fonksiyon
        function evaluateAnswers() {
            let allCorrect = true;

            quizData.forEach(q => {
                if (userAnswers[q.id] !== q.isCorrect) {
                    allCorrect = false;
                }
            });

            showPopup(allCorrect);
        }

        // Popup Gösterimi
        function showPopup(isSuccess) {
            const overlay = document.getElementById('popup-overlay');
            const content = document.getElementById('popup-content');
            const title = document.getElementById('popup-title');
            const message = document.getElementById('popup-message');
            const icon = document.getElementById('popup-icon');
            const btn = document.getElementById('popup-btn');

            content.classList.remove('popup-anim'); // Animasyonu sıfırla
            void content.offsetWidth; // Yeniden boyamayı tetikle (Animasyonun tekrar oynaması için)
            content.classList.add('popup-anim');

            if (isSuccess) {
                playSound('finish'); // Tebrik sesi
                
                // --- KONFETİ PATLATMA EFEKTİ ---
                const duration = 3 * 1000; // 3 saniye sürsün
                const animationEnd = Date.now() + duration;
                const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

                function randomInRange(min, max) {
                    return Math.random() * (max - min) + min;
                }

                const interval = setInterval(function() {
                    const timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }
                    const particleCount = 50 * (timeLeft / duration);
                    // Sağ ve sol köşelerden rastgele fırlat
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                }, 250);
                // -------------------------------

                icon.innerHTML = '🎉🥳';
                title.innerText = 'Harika İş Çıkardın!';
                title.className = 'text-7xl font-black text-green-500 mb-6';
                message.innerText = 'Bütün soruları doğru yanıtladın. Konuyu çok iyi anlamışsın!';
                btn.innerText = 'Tekrar Oyna';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#16a34a] hover:translate-y-[4px] hover:shadow-[0_4px_0_#16a34a] transition-all bg-green-500 text-white';
            } else {
                playSound('wrong'); // Yanlış cevap sesi
                icon.innerHTML = '🤔';
                title.innerText = 'Biraz Daha Düşün!';
                title.className = 'text-7xl font-black text-red-500 mb-6';
                message.innerText = 'Bazı cevapların yanlış. Cümleleri tekrar okuyup yeniden denemeye ne dersin?';
                btn.innerText = 'Tekrar Dene';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#2563eb] hover:translate-y-[4px] hover:shadow-[0_4px_0_#2563eb] transition-all bg-blue-600 text-white';
            }

            overlay.classList.remove('hidden');
        }

        // Popup Kapatma ve Oyunu Sıfırlama
        function closePopup() {
            playSound('click'); // Butona tıklama sesi
            
            document.getElementById('popup-overlay').classList.add('hidden');
            initApp(); // Seçimleri temizle ve en başa dön
        }

        // Sayfa yüklendiğinde başlat
        window.onload = initApp;

    </script>
</body>
</html>
