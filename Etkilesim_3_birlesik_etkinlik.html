<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğlenceli Etkinlik: Eşleştirme ve Test</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Konfeti efekti için kütüphane -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1b4b; /* Ekranın geri kalanı için koyu arka plan */
            overflow: hidden; /* Kaydırma çubuklarını gizle */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 1920x1080 Sabit Oyun Alanı */
        #game-container {
            width: 1920px;
            height: 1080px;
            position: absolute;
            transform-origin: center center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .pop-animation {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .popup-anim {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Hover animasyonlarını daha yumuşak yapmak için (Test Aşaması) */
        .option-btn {
            transition: all 0.2s ease-in-out;
        }
        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 transparent !important;
        }

        /* Sürükle bırak için özel stiller (Eşleştirme Aşaması) */
        .draggable {
            cursor: grab;
            touch-action: none;
            user-select: none;
        }
        .draggable:active {
            cursor: grabbing;
        }
        .dragging {
            opacity: 0.9 !important;
            transform: scale(1.05) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5) !important;
            transition: none !important;
        }
        .dropzone-active {
            background-color: rgba(255, 255, 255, 0.6) !important;
            border-color: #4ade80 !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <!-- 1920x1080 Sabit Konteyner -->
    <div id="game-container" class="bg-gradient-to-br from-indigo-300 via-purple-300 to-pink-300 flex flex-col items-center justify-center p-10 relative">

        <!-- ==========================================
             AŞAMA 1: EŞLEŞTİRME OYUNU
             ========================================== -->
        <div id="stage-matching" class="w-full flex flex-col items-center justify-center">
            
            <div class="text-center mb-12 pop-animation" style="animation-delay: 0.1s;">
                <span class="bg-indigo-100 text-indigo-700 font-black text-2xl py-2 px-8 rounded-full mb-6 border-4 border-indigo-200 shadow-sm inline-block">
                    Aşama 1 / 2
                </span>
                <h1 class="text-7xl font-black text-white drop-shadow-xl mb-6">
                    🧩 Kavramları Eşleştir
                </h1>
                <p class="text-3xl font-bold text-purple-900 bg-white/60 inline-block px-10 py-4 rounded-full shadow-md">
                    Aşağıdaki kavramları doğru açıklamaların içine sürükle ve bırak! 🚀
                </p>
            </div>

            <!-- Açıklamaların (Hedeflerin) Bulunduğu Alan -->
            <div id="targets-container" class="w-full max-w-[1600px] grid grid-cols-2 gap-16 mb-12">
                <!-- JavaScript ile doldurulacak -->
            </div>

            <!-- Sürüklenecek Kavramların Bulunduğu Alan (Havuz) -->
            <div class="w-full max-w-[1600px] bg-white/30 border-8 border-white/50 rounded-[3rem] p-10 shadow-inner relative pop-animation" style="animation-delay: 0.4s;">
                <h3 class="absolute -top-6 left-1/2 -translate-x-1/2 bg-purple-600 text-white px-8 py-2 rounded-full text-2xl font-black shadow-lg">
                    Kavram Havuzu
                </h3>
                <div id="draggables-container" class="flex justify-center gap-12 min-h-[140px] items-center flex-wrap">
                    <!-- JavaScript ile doldurulacak -->
                </div>
            </div>

        </div>

        <!-- ==========================================
             AŞAMA 2: ÇOKTAN SEÇMELİ TEST
             ========================================== -->
        <div id="stage-quiz" class="w-full flex flex-col items-center justify-center hidden">
            
            <!-- Başlık Alanı -->
            <div class="text-center mb-6 pop-animation" style="animation-delay: 0.1s;">
                <span class="bg-indigo-100 text-indigo-700 font-black text-2xl py-2 px-8 rounded-full mb-6 border-4 border-indigo-200 shadow-sm inline-block">
                    Aşama 2 / 2
                </span>
                <h1 class="text-7xl font-black text-white drop-shadow-xl mb-6">
                    🎯 Bilgini Test Et!
                </h1>
                <p class="text-3xl font-bold text-purple-900 bg-white/60 inline-block px-10 py-4 rounded-full shadow-md">
                    Soruyu dikkatlice oku ve doğru şıkkı işaretle! 🚀
                </p>
            </div>

            <!-- Soruların Yükleneceği Alan -->
            <div id="quiz-container" class="w-full max-w-[1600px] mt-2">
                <!-- Soru JavaScript ile buraya eklenecek -->
            </div>

        </div>

        <!-- ==========================================
             ORTAK POPUP (GERİ BİLDİRİM EKRANI)
             ========================================== -->
        <div id="popup-overlay" class="absolute inset-0 bg-black/70 hidden flex items-center justify-center z-50 rounded-3xl backdrop-blur-sm">
            <div id="popup-content" class="bg-white rounded-[3rem] p-20 text-center shadow-2xl max-w-4xl w-full border-8 border-white">
                <div id="popup-icon" class="text-9xl mb-8"></div>
                <h2 id="popup-title" class="text-7xl font-black mb-6"></h2>
                <p id="popup-message" class="text-4xl font-bold text-gray-600 mb-12 leading-relaxed"></p>
                <button id="popup-btn" onclick="closePopup()" class="text-4xl font-black py-6 px-16 rounded-full transition-all">
                </button>
            </div>
        </div>

    </div>

    <script>
        // =====================================================================
        // 🛠️ VERİ ALANI
        // =====================================================================
        
        // AŞAMA 1: Eşleştirme Verileri
        const matchData = [
            {
                id: "pair1",
                description: "Sürekli gelen mesaj ve uyarılar nedeniyle dikkatimizin dağılması.",
                concept: "Bildirim Yorgunluğu"
            },
            {
                id: "pair2",
                description: "Teknolojinin yoğun kullanımına ara verip kısa molalar vermek.",
                concept: "Dijital Detoks"
            }
        ];

        // AŞAMA 1: Çeldirici (Boşta kalacak) Kavramlar
        const distractors = [
            {
                id: "dist1",
                concept: "Siber Zorbalık"
            }
        ];

        // AŞAMA 2: Test (Soru) Verileri
        const quizData = [
            {
                id: 1,
                question: "Bilgisayar karşısında ergonomik oturuş verilen görsellerden hangisidir?",
                options: ["images/1a.png", "images/1b.png", "images/1c.png", "images/1d.png"],
                correctIndex: 0 // Doğru cevap A şıkkı (1a.png)
            }
        ];

        // =====================================================================
        // GLOBAL DURUM (STATE) DEĞİŞKENLERİ
        // =====================================================================
        let currentQuestionIndex = 0; 
        let popupState = ''; // 'match-wrong', 'match-finish', 'quiz-wrong', 'quiz-next', 'quiz-finish'

        // --- SES EFEKTLERİ İÇİN WEB AUDIO API ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            if (type === 'click') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(450, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'correct') {
                const notes = [523.25, 659.25, 783.99];
                notes.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(freq, now);
                    const startTime = now + (index * 0.08);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.15, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);
                    osc.start(startTime);
                    osc.stop(startTime + 0.6);
                });
            } else if (type === 'wrong') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(329.63, now);
                osc.frequency.exponentialRampToValueAtTime(261.63, now + 0.4);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            } else if (type === 'finish') {
                const notes = [392.00, 523.25, 659.25, 783.99, 659.25, 1046.50];
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                notes.forEach((freq, i) => {
                    osc.frequency.setValueAtTime(freq, now + (i * 0.15));
                });
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
                gain.gain.setValueAtTime(0.15, now + 0.6);
                gain.gain.linearRampToValueAtTime(0, now + 1.0);
                osc.start(now);
                osc.stop(now + 1.0);
            }
        }

        // --- KONFETİ EFEKTİ ---
        function fireConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // Ekran Ölçeklendirme
        function resizeGame() {
            const container = document.getElementById('game-container');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeGame);

        // =====================================================================
        // ANA AKIŞ YÖNETİMİ
        // =====================================================================
        function initApp() {
            resizeGame();
            // Aşamaları ayarla: Eşleştirmeyi göster, Testi gizle
            document.getElementById('stage-matching').classList.remove('hidden');
            document.getElementById('stage-quiz').classList.add('hidden');
            
            initMatchingStage();
        }

        function startQuizStage() {
            // Aşamaları değiştir: Eşleştirmeyi gizle, Testi göster
            document.getElementById('stage-matching').classList.add('hidden');
            document.getElementById('stage-quiz').classList.remove('hidden');
            
            currentQuestionIndex = 0;
            loadQuestion();
        }

        // =====================================================================
        // AŞAMA 1: EŞLEŞTİRME MANTIĞI
        // =====================================================================
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initMatchingStage() {
            const targetsContainer = document.getElementById('targets-container');
            const draggablesContainer = document.getElementById('draggables-container');
            
            targetsContainer.innerHTML = '';
            draggablesContainer.innerHTML = '';

            // Hem asıl kavramları hem de çeldiricileri aynı havuza atıp karıştırıyoruz
            let concepts = [...matchData, ...distractors];
            concepts = shuffleArray(concepts);

            matchData.forEach((data, index) => {
                const delay = 0.2 + (index * 0.1);
                const targetCard = document.createElement('div');
                targetCard.className = `bg-white rounded-[2.5rem] p-10 shadow-2xl border-8 border-white/50 pop-animation flex flex-col justify-between`;
                targetCard.style.animationDelay = `${delay}s`;
                targetCard.style.opacity = '0';
                
                targetCard.innerHTML = `
                    <div class="mb-8 flex-grow flex items-center justify-center">
                        <h2 class="text-4xl font-bold text-gray-700 leading-relaxed text-center">
                            ${data.description}
                        </h2>
                    </div>
                    <div class="dropzone w-full h-48 bg-gray-100 border-4 border-dashed border-gray-300 rounded-3xl flex items-center justify-center transition-all duration-300 relative" data-match="${data.id}">
                        <span class="text-gray-400 font-bold text-3xl dropzone-text absolute pointer-events-none">Kavramı Buraya Sürükle</span>
                    </div>
                `;
                targetsContainer.appendChild(targetCard);
            });

            concepts.forEach((concept) => {
                const dragItem = document.createElement('div');
                dragItem.className = `draggable bg-blue-500 text-white font-black text-4xl py-6 w-[450px] h-36 rounded-full shadow-[0_8px_0_#1d4ed8] hover:translate-y-[2px] hover:shadow-[0_6px_0_#1d4ed8] transition-all flex items-center justify-center text-center cursor-pointer`;
                dragItem.id = `drag-${concept.id}`;
                dragItem.dataset.id = concept.id;
                dragItem.innerHTML = concept.concept;
                draggablesContainer.appendChild(dragItem);
            });

            setupDragAndDrop();
        }

        function setupDragAndDrop() {
            const draggables = document.querySelectorAll('.draggable');
            const dropzones = document.querySelectorAll('.dropzone');
            
            let activeItem = null;
            let startX, startY, initialX, initialY;

            draggables.forEach(item => {
                item.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });

                item.addEventListener('pointerdown', (e) => {
                    if (e.pointerType === 'mouse' && e.button !== 0) return;
                    e.preventDefault();
                    playSound('click');
                    activeItem = item;
                    
                    const gameContainer = document.getElementById('game-container');
                    const scale = parseFloat(gameContainer.style.transform.replace('scale(', '').replace(')', '')) || 1;

                    const rect = item.getBoundingClientRect();
                    const containerRect = gameContainer.getBoundingClientRect();
                    
                    initialX = (rect.left - containerRect.left) / scale;
                    initialY = (rect.top - containerRect.top) / scale;
                    
                    item.style.position = 'absolute';
                    item.style.left = `${initialX}px`;
                    item.style.top = `${initialY}px`;
                    item.style.margin = '0';
                    item.style.zIndex = '1000';
                    item.classList.add('dragging');
                    
                    gameContainer.appendChild(item);

                    startX = e.clientX;
                    startY = e.clientY;
                    item.setPointerCapture(e.pointerId);
                });

                item.addEventListener('pointermove', (e) => {
                    if (!activeItem || activeItem !== item) return;

                    const scale = parseFloat(document.getElementById('game-container').style.transform.replace('scale(', '').replace(')', '')) || 1;
                    
                    const dx = (e.clientX - startX) / scale;
                    const dy = (e.clientY - startY) / scale;

                    item.style.left = `${initialX + dx}px`;
                    item.style.top = `${initialY + dy}px`;

                    const hoveredZone = getIntersectingDropzone(e.clientX, e.clientY);
                    
                    dropzones.forEach(zone => zone.classList.remove('dropzone-active'));
                    if (hoveredZone) {
                        hoveredZone.classList.add('dropzone-active');
                    }
                });

                const handleEnd = (e) => {
                    if (!activeItem || activeItem !== item) return;

                    item.releasePointerCapture(e.pointerId);
                    item.classList.remove('dragging');
                    
                    const droppedZone = getIntersectingDropzone(e.clientX, e.clientY);
                    dropzones.forEach(zone => zone.classList.remove('dropzone-active'));

                    if (droppedZone) {
                        const existingItem = droppedZone.querySelector('.draggable');
                        if (existingItem && existingItem !== item) {
                            resetItemToPool(existingItem);
                        }

                        droppedZone.appendChild(item);
                        // Kutu içine ortalanması için stilleri sıfırla
                        item.style.position = 'relative';
                        item.style.left = 'auto';
                        item.style.top = 'auto';
                        item.style.zIndex = '1';
                        
                        const placeholder = droppedZone.querySelector('.dropzone-text');
                        if (placeholder) placeholder.style.display = 'none';

                        playSound('click');
                        checkMatchComplete();
                    } else {
                        resetItemToPool(item);
                        playSound('click');
                    }

                    updateDropzones();
                    activeItem = null;
                };

                item.addEventListener('pointerup', handleEnd);
                item.addEventListener('pointercancel', handleEnd);
            });
        }

        function getIntersectingDropzone(mouseX, mouseY) {
            const dropzones = document.querySelectorAll('.dropzone');
            for (let zone of dropzones) {
                const rect = zone.getBoundingClientRect();
                if (mouseX >= rect.left && mouseX <= rect.right &&
                    mouseY >= rect.top && mouseY <= rect.bottom) {
                    return zone;
                }
            }
            return null;
        }

        function resetItemToPool(item) {
            const draggablesContainer = document.getElementById('draggables-container');
            draggablesContainer.appendChild(item);
            item.style.position = 'relative';
            item.style.left = 'auto';
            item.style.top = 'auto';
            item.style.zIndex = '1';
        }

        function updateDropzones() {
            const dropzones = document.querySelectorAll('.dropzone');
            dropzones.forEach(zone => {
                const hasItem = zone.querySelector('.draggable');
                const placeholder = zone.querySelector('.dropzone-text');
                if (!hasItem && placeholder) {
                    placeholder.style.display = 'block';
                }
            });
        }

        function checkMatchComplete() {
            const dropzones = document.querySelectorAll('.dropzone');
            let filledCount = 0;
            dropzones.forEach(zone => {
                if (zone.querySelector('.draggable')) filledCount++;
            });

            if (filledCount === matchData.length) {
                setTimeout(evaluateMatchAnswers, 500);
            }
        }

        function evaluateMatchAnswers() {
            const dropzones = document.querySelectorAll('.dropzone');
            let allCorrect = true;

            dropzones.forEach(zone => {
                const targetMatchId = zone.dataset.match;
                const droppedItem = zone.querySelector('.draggable');
                
                if (droppedItem) {
                    const itemMatchId = droppedItem.dataset.id;
                    if (targetMatchId !== itemMatchId) {
                        allCorrect = false;
                        droppedItem.classList.remove('bg-blue-500');
                        droppedItem.classList.add('bg-red-500');
                    } else {
                        droppedItem.classList.remove('bg-blue-500', 'bg-red-500');
                        droppedItem.classList.add('bg-green-500');
                    }
                }
            });

            if (allCorrect) {
                showPopup('match-finish');
            } else {
                showPopup('match-wrong');
            }
        }

        // =====================================================================
        // AŞAMA 2: ÇOKTAN SEÇMELİ TEST MANTIĞI
        // =====================================================================
        function loadQuestion() {
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = ''; 
            
            const q = quizData[currentQuestionIndex];
            const card = document.createElement('div');
            
            card.className = `bg-white rounded-[2.5rem] p-10 shadow-2xl border-8 border-white/50 pop-animation relative overflow-hidden w-full`;
            card.style.opacity = '0'; 

            const letters = ['A', 'B', 'C', 'D'];
            let optionsHtml = '';
            
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <button onclick="selectAnswer(${idx})" class="option-btn w-full bg-indigo-500 p-4 rounded-3xl shadow-[0_8px_0_#3730a3] hover:translate-y-[4px] hover:shadow-[0_4px_0_#3730a3] flex flex-col items-center justify-center relative h-64">
                        <span class="absolute top-4 left-4 bg-white text-indigo-700 rounded-full w-12 h-12 flex items-center justify-center shrink-0 text-3xl shadow-lg font-black z-10">${letters[idx]}</span>
                        <div class="w-full h-full bg-white rounded-xl flex items-center justify-center p-3 overflow-hidden border-4 border-indigo-400">
                            <img src="${opt}" alt="Şık ${letters[idx]}" class="max-h-full max-w-full object-contain hover:scale-105 transition-transform duration-300">
                        </div>
                    </button>
                `;
            });

            // Eğer ileride birden fazla soru eklerseniz sayaç otomatik tekrar görünür
            let questionCounterHtml = '';
            if (quizData.length > 1) {
                questionCounterHtml = `
                    <span class="bg-purple-100 text-purple-700 font-black text-2xl py-2 px-8 rounded-full mb-6 border-4 border-purple-200 shadow-sm">
                        Soru ${currentQuestionIndex + 1} / ${quizData.length}
                    </span>
                `;
            }

            card.innerHTML = `
                <div class="flex flex-col items-center mb-8">
                    ${questionCounterHtml}
                    <h2 class="text-5xl font-extrabold text-gray-800 leading-snug text-center px-10">
                        ${q.question}
                    </h2>
                </div>
                
                <div class="grid grid-cols-4 gap-6 mt-2">
                    ${optionsHtml}
                </div>
            `;

            quizContainer.appendChild(card);
        }

        function selectAnswer(selectedIndex) {
            playSound('click');
            const q = quizData[currentQuestionIndex];

            if (selectedIndex === q.correctIndex) {
                if (currentQuestionIndex === quizData.length - 1) {
                    showPopup('quiz-finish');
                } else {
                    showPopup('quiz-next');
                }
            } else {
                showPopup('quiz-wrong');
            }
        }

        // =====================================================================
        // ORTAK POPUP YÖNETİMİ
        // =====================================================================
        function showPopup(state) {
            popupState = state; 
            
            const overlay = document.getElementById('popup-overlay');
            const content = document.getElementById('popup-content');
            const title = document.getElementById('popup-title');
            const message = document.getElementById('popup-message');
            const icon = document.getElementById('popup-icon');
            const btn = document.getElementById('popup-btn');

            content.classList.remove('popup-anim');
            void content.offsetWidth; 
            content.classList.add('popup-anim');

            // Durumlara Göre İçerik Ayarla
            if (state === 'match-finish') {
                playSound('correct'); 
                fireConfetti(); 
                icon.innerHTML = '🎉🥳';
                title.innerText = 'Harika İş Çıkardın!';
                title.className = 'text-7xl font-black text-green-500 mb-6';
                message.innerText = 'Kavram eşleştirmesini başarıyla tamamladın. Şimdi test aşamasına geçelim!';
                btn.innerText = 'Test Aşamasına Geç';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#16a34a] hover:translate-y-[4px] hover:shadow-[0_4px_0_#16a34a] transition-all bg-green-500 text-white';
            } 
            else if (state === 'match-wrong') {
                playSound('wrong');
                icon.innerHTML = '🤔';
                title.innerText = 'Biraz Daha Düşün!';
                title.className = 'text-7xl font-black text-red-500 mb-6';
                message.innerText = 'Bazı eşleştirmeler yanlış oldu. Hatalı olanları düzelterek tekrar denemeye ne dersin?';
                btn.innerText = 'Tekrar Dene';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#2563eb] hover:translate-y-[4px] hover:shadow-[0_4px_0_#2563eb] transition-all bg-blue-600 text-white';
            }
            else if (state === 'quiz-next') {
                playSound('correct');
                icon.innerHTML = '✅👏';
                title.innerText = 'Doğru Cevap!';
                title.className = 'text-7xl font-black text-green-500 mb-6';
                message.innerText = 'Harika gidiyorsun! Hazırsan diğer soruya geçelim.';
                btn.innerText = 'Sonraki Soru';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#16a34a] hover:translate-y-[4px] hover:shadow-[0_4px_0_#16a34a] transition-all bg-green-500 text-white';
            } 
            else if (state === 'quiz-finish') {
                playSound('finish'); 
                fireConfetti(); 
                icon.innerHTML = '🏆🎊';
                title.innerText = 'Tebrikler, Bitti!';
                title.className = 'text-7xl font-black text-green-500 mb-6';
                message.innerText = 'Tüm etkinlikleri (Eşleştirme ve Test) harika bir şekilde tamamladın. Konuyu çok iyi anlamışsın!';
                btn.innerText = 'Baştan Oyna';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#16a34a] hover:translate-y-[4px] hover:shadow-[0_4px_0_#16a34a] transition-all bg-green-500 text-white';
            }
            else if (state === 'quiz-wrong') {
                playSound('wrong'); 
                icon.innerHTML = '🤔';
                title.innerText = 'Biraz Daha Düşün!';
                title.className = 'text-7xl font-black text-red-500 mb-6';
                message.innerText = 'Cevabın yanlış. Soruyu tekrar okuyup yeniden denemeye ne dersin?';
                btn.innerText = 'Tekrar Dene';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#2563eb] hover:translate-y-[4px] hover:shadow-[0_4px_0_#2563eb] transition-all bg-blue-600 text-white';
            }

            overlay.classList.remove('hidden');
        }

        function closePopup() {
            playSound('click'); 
            document.getElementById('popup-overlay').classList.add('hidden');
            
            if (popupState === 'match-finish') {
                startQuizStage(); // Eşleştirmeyi bitirdi, teste geç
            } 
            else if (popupState === 'match-wrong') {
                initMatchingStage(); // Yanlış yaptı, sadece eşleştirmeyi sıfırla
            } 
            else if (popupState === 'quiz-next') {
                currentQuestionIndex++; // Testte sonraki soruya geç
                loadQuestion();
            } 
            else if (popupState === 'quiz-finish') {
                initApp(); // Tüm oyun bitti, en başa (Eşleştirmeye) dön
            }
            // 'quiz-wrong' durumunda hiçbir şey yapmıyoruz, pencere kapanıyor ve aynı soruda kalıyor.
        }

        // Sayfa yüklendiğinde başlat
        window.onload = initApp;

    </script>
</body>
</html>
