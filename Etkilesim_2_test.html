<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çoktan Seçmeli Test</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Konfeti Efekti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1b4b; /* Ekranın geri kalanı için koyu arka plan */
            overflow: hidden; /* Kaydırma çubuklarını gizle */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 1920x1080 Sabit Oyun Alanı */
        #game-container {
            width: 1920px;
            height: 1080px;
            position: absolute;
            transform-origin: center center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .pop-animation {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .popup-anim {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Hover animasyonlarını daha yumuşak yapmak için */
        .option-btn {
            transition: all 0.2s ease-in-out;
        }
        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 transparent !important;
        }
    </style>
</head>
<body>

    <!-- 1920x1080 Sabit Konteyner -->
    <div id="game-container" class="bg-gradient-to-br from-indigo-300 via-purple-300 to-pink-300 flex flex-col items-center justify-center p-10">

        <!-- Başlık Alanı -->
        <div class="text-center mb-6 pop-animation" style="animation-delay: 0.1s;">
            <h1 class="text-7xl font-black text-white drop-shadow-xl mb-6">
                🎯 Bilgini Test Et!
            </h1>
            <p class="text-3xl font-bold text-purple-900 bg-white/60 inline-block px-10 py-4 rounded-full shadow-md">
                Soruyu dikkatlice oku ve doğru şıkkı işaretle! 🚀
            </p>
        </div>

        <!-- Soruların Yükleneceği Alan -->
        <div id="quiz-container" class="w-full max-w-6xl mt-4">
            <!-- Soru JavaScript ile buraya eklenecek -->
        </div>

        <!-- Yüzen Geri Bildirim Popup'ı (Başlangıçta Gizli) -->
        <div id="popup-overlay" class="absolute inset-0 bg-black/70 hidden flex items-center justify-center z-50 rounded-3xl backdrop-blur-sm">
            <div id="popup-content" class="bg-white rounded-[3rem] p-20 text-center shadow-2xl max-w-4xl w-full border-8 border-white">
                <div id="popup-icon" class="text-9xl mb-8"></div>
                <h2 id="popup-title" class="text-7xl font-black mb-6"></h2>
                <p id="popup-message" class="text-4xl font-bold text-gray-600 mb-12 leading-relaxed"></p>
                <button id="popup-btn" onclick="closePopup()" class="text-4xl font-black py-6 px-16 rounded-full transition-all">
                </button>
            </div>
        </div>

    </div>

    <script>
        // =====================================================================
        // 🛠️ SORU ALANI (İSTEDİĞİNİZ KADAR SORU EKLEYEBİLİRSİNİZ)
        // =====================================================================
        const quizData = [
            {
                id: 1,
                question: "Bilgisayar kullanırken göz ve beden sağlığımızı korumak adına ekrandan en az kaç santimetre (cm) uzakta durmalıyız?",
                options: ["10 cm", "20 cm", "35 cm", "50 cm"],
                correctIndex: 3 // D şıkkı (0, 1, 2, 3)
            },
            {
                id: 2,
                question: "Teknolojik araçları kendi beden sağlığımıza uygun ve zarar görmeyecek şekilde kurallarla kullanmaya ne denir?",
                options: ["Teknoloji bağımlılığı", "Ergonomi", "Siber güvenlik", "Dijital vatandaşlık"],
                correctIndex: 1 // B şıkkı
            }
        ];
        // =====================================================================

        let currentQuestionIndex = 0; // Hangi soruda olduğumuzu takip eder
        let popupState = ''; // 'wrong', 'next' veya 'finish' durumlarını tutar

        // --- SES EFEKTLERİ İÇİN WEB AUDIO API ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            
            const now = audioCtx.currentTime;

            if (type === 'click') {
                // Yumuşak, ksilofon benzeri dokunma sesi
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine'; // En yumuşak ses dalgası
                osc.frequency.setValueAtTime(450, now);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.02); // Aniden patlama yapmaması için yavaş yükselt
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15); // Sakince sönümlen
                
                osc.start(now);
                osc.stop(now + 0.15);

            } else if (type === 'correct') {
                // Yumuşak zil sesi (Arpej - art arda çalan 3 nota)
                const notes = [523.25, 659.25, 783.99]; // C5, E5, G5 (Do-Mi-Sol)
                notes.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(freq, now);

                    const startTime = now + (index * 0.08); // Notaları peş peşe çal
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.15, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);

                    osc.start(startTime);
                    osc.stop(startTime + 0.6);
                });

            } else if (type === 'wrong') {
                // Yumuşak, yavaşça düşen uyarı tonu
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'triangle'; // Sine dalgasına yakın, biraz daha tok
                osc.frequency.setValueAtTime(329.63, now); // Mi (E4)
                osc.frequency.exponentialRampToValueAtTime(261.63, now + 0.4); // Do (C4)
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.1); // Sesi yumuşakça başlat
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6); // Yumuşakça bitir
                
                osc.start(now);
                osc.stop(now + 0.6);

            } else if (type === 'finish') {
                // Beğendiğiniz melodi, ancak daha yumuşak "triangle" dalgası ile
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'triangle'; // Square yerine daha yumuşak, flüt benzeri ton
                
                // Hızlı, eğlenceli nota geçişleri
                osc.frequency.setValueAtTime(392.00, now); // G4
                osc.frequency.setValueAtTime(523.25, now + 0.1); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.2); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.3); // G5
                osc.frequency.setValueAtTime(659.25, now + 0.45); // E5
                osc.frequency.setValueAtTime(1046.50, now + 0.6); // C6
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.15, now + 0.05); // Yumuşak giriş
                gain.gain.setValueAtTime(0.15, now + 0.6);
                gain.gain.linearRampToValueAtTime(0, now + 1.0); // Yavaşça sönümlenerek bitiş
                
                osc.start(now);
                osc.stop(now + 1.0);
            }
        }
        // ----------------------------------------

        // Ekranı 1920x1080 oranında ölçeklendirme fonksiyonu
        function resizeGame() {
            const container = document.getElementById('game-container');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            container.style.transform = `scale(${scale})`;
        }

        // Pencere boyutu değiştiğinde ölçeklemeyi güncelle
        window.addEventListener('resize', resizeGame);

        const quizContainer = document.getElementById('quiz-container');

        // Uygulamayı Başlat
        function initApp() {
            resizeGame();
            currentQuestionIndex = 0; // Oyunu baştan başlat
            loadQuestion();
        }

        // Aktif Soruyu Ekrana Yükler
        function loadQuestion() {
            quizContainer.innerHTML = ''; // İçeriği temizle
            
            const q = quizData[currentQuestionIndex];
            const card = document.createElement('div');
            
            card.className = `bg-white rounded-[2.5rem] p-12 shadow-2xl border-8 border-white/50 pop-animation relative overflow-hidden w-full`;
            card.style.opacity = '0'; // Animasyon başlangıcı için

            // Şıkların HTML'ini oluşturuyoruz (A, B, C, D)
            const letters = ['A', 'B', 'C', 'D'];
            let optionsHtml = '';
            
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <button onclick="selectAnswer(${idx})" class="option-btn w-full bg-indigo-500 text-white font-bold text-4xl py-6 px-8 rounded-3xl shadow-[0_8px_0_#3730a3] hover:translate-y-[4px] hover:shadow-[0_4px_0_#3730a3] flex items-center gap-6 text-left">
                        <span class="bg-white text-indigo-700 rounded-full w-16 h-16 flex items-center justify-center shrink-0 text-4xl shadow-inner font-black">${letters[idx]}</span>
                        <span class="leading-tight">${opt}</span>
                    </button>
                `;
            });

            card.innerHTML = `
                <div class="flex flex-col items-center mb-10">
                    <span class="bg-purple-100 text-purple-700 font-black text-2xl py-3 px-8 rounded-full mb-8 border-4 border-purple-200 shadow-sm">
                        Soru ${currentQuestionIndex + 1} / ${quizData.length}
                    </span>
                    <h2 class="text-5xl font-extrabold text-gray-800 leading-snug text-center">
                        ${q.question}
                    </h2>
                </div>
                
                <div class="grid grid-cols-2 gap-8 mt-4">
                    ${optionsHtml}
                </div>
            `;

            quizContainer.appendChild(card);
        }

        // Öğrenci Bir Şık Seçtiğinde Çalışan Fonksiyon
        function selectAnswer(selectedIndex) {
            playSound('click'); // Şıkka tıklandığında ses çal
            
            const q = quizData[currentQuestionIndex];

            // Doğru cevap ise
            if (selectedIndex === q.correctIndex) {
                // Eğer son sorudaysak tebrikler ekranı
                if (currentQuestionIndex === quizData.length - 1) {
                    showPopup('finish');
                } else {
                    // Son soruda değilsek sonraki soruya geçiş ekranı
                    showPopup('next');
                }
            } else {
                // Yanlış cevap ise tekrar dene ekranı
                showPopup('wrong');
            }
        }

        // --- KONFETİ EFEKTİ ---
        function fireConfetti() {
            var duration = 3 * 1000; // 3 saniye boyunca patlasın
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 }; // Z-index yüksek tutuldu (popup'ın üstünde çıksın)

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                
                // Ekranın iki farklı noktasından patlamalar oluştur
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }

        // Popup Gösterimi (Duruma Göre Özelleşir)
        function showPopup(state) {
            popupState = state; // Kapanırken ne yapılacağını bilmek için durumu kaydet
            
            const overlay = document.getElementById('popup-overlay');
            const content = document.getElementById('popup-content');
            const title = document.getElementById('popup-title');
            const message = document.getElementById('popup-message');
            const icon = document.getElementById('popup-icon');
            const btn = document.getElementById('popup-btn');

            // Animasyonu sıfırla ve yeniden tetikle
            content.classList.remove('popup-anim');
            void content.offsetWidth; 
            content.classList.add('popup-anim');

            if (state === 'finish') {
                playSound('finish'); // Tebrikler sesi
                fireConfetti(); // Konfetileri patlat
                icon.innerHTML = '🎉🥳';
                title.innerText = 'Harika İş Çıkardın!';
                title.className = 'text-7xl font-black text-green-500 mb-6';
                message.innerText = 'Bütün soruları doğru yanıtladın. Konuyu çok iyi anlamışsın!';
                btn.innerText = 'Tekrar Oyna';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#16a34a] hover:translate-y-[4px] hover:shadow-[0_4px_0_#16a34a] transition-all bg-green-500 text-white';
            } 
            else if (state === 'next') {
                playSound('correct'); // Doğru cevap sesi
                icon.innerHTML = '✅👏';
                title.innerText = 'Doğru Cevap!';
                title.className = 'text-7xl font-black text-green-500 mb-6';
                message.innerText = 'Harika gidiyorsun! Hazırsan diğer soruya geçelim.';
                btn.innerText = 'Sonraki Soru';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#16a34a] hover:translate-y-[4px] hover:shadow-[0_4px_0_#16a34a] transition-all bg-green-500 text-white';
            } 
            else if (state === 'wrong') {
                playSound('wrong'); // Yanlış cevap sesi
                icon.innerHTML = '🤔';
                title.innerText = 'Biraz Daha Düşün!';
                title.className = 'text-7xl font-black text-red-500 mb-6';
                message.innerText = 'Cevabın yanlış. Soruyu tekrar okuyup yeniden denemeye ne dersin?';
                btn.innerText = 'Tekrar Dene';
                btn.className = 'text-4xl font-black py-6 px-16 rounded-full shadow-[0_8px_0_#2563eb] hover:translate-y-[4px] hover:shadow-[0_4px_0_#2563eb] transition-all bg-blue-600 text-white';
            }

            overlay.classList.remove('hidden');
        }

        // Popup Kapatma ve Duruma Göre Yönlendirme
        function closePopup() {
            playSound('click'); // Butona tıklama sesi

            document.getElementById('popup-overlay').classList.add('hidden');
            
            if (popupState === 'next') {
                // Sonraki soruya geç
                currentQuestionIndex++;
                loadQuestion();
            } else if (popupState === 'finish') {
                // Oyunu baştan başlat
                initApp();
            }
            // 'wrong' durumunda hiçbir şey yapmıyoruz, öğrenci aynı soruda kalıp tekrar deniyor.
        }

        // Sayfa yüklendiğinde başlat
        window.onload = initApp;

    </script>
</body>
</html>
